# Lefthook configuration for git hooks

# Run ESLint and tests before committing
pre-commit:
  commands:
    "format":
      run: bun run format
    "lint":
      run: bun run lint

# Run tests, typecheck, and knip before pushing
pre-push:
  commands:
    "run tests":
      run: bun run test:vitest:run
    "check types":
      run: bun run typecheck
    "knip":
      run: bun run knip

# Validate commit messages with commitlint
commit-msg:
  commands:
    "lint commit message":
      run: bunx commitlint --edit {1}
